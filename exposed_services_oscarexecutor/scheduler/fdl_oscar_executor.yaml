functions:
  oscar:
    - oscar-cluster:
        name: airflow-scheduler
        memory: 500Mi
        cpu: '0.5'
        image: localhost:5001/airflow-oscar:latest
        script: entrypoint.sh
        environment:
          Variables:
            AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@airflow-postgres66-db:5432/airflow"
            _AIRFLOW_DB_MIGRATE: "true"
            AIRFLOW__CORE__LOAD_EXAMPLES: "false"
            AIRFLOW__CORE__AUTH_MANAGER: "airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager"
            AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver-svc/system/services/airflow-webserver/exposed/execution/"
            AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
            AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_SERVER_PORT: "8974"
            AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "5"
            AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL: "5"
            AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD: "30"

            AIRFLOW__CORE__FERNET_KEY: "oJ7Fz4Yk5pH3Yb6nP2Y9vKXQm3R8tU5wZc1dEfGhIjk="
            AIRFLOW__API_AUTH__JWT_SECRET: "your-long-random-string-here2"
            AIRFLOW__API__SECRET_KEY: "your-long-random-string-here2"

            AIRFLOW__CORE__EXECUTOR: "oscar_executor.OSCARExecutor" 
            AIRFLOW__OSCAR__ENDPOINT: http://oscar.oscar.svc.cluster.local:8080
            AIRFLOW__OSCAR__SERVICE_NAME: airflow-worker
            AIRFLOW__OSCAR__SERVICE_TOKEN: 0057e7db44461a81679d2db7a22423a9456859a35af6093a890162c1ab527002
            AIRFLOW__OSCAR__TASK_TIMEOUT: "300"
            AIRFLOW__OSCAR__MAX_WORKERS: "10"

            AIRFLOW__CORE__DAGS_FOLDER: "/mnt/airflow/dags"
            AIRFLOW__LOGGING__BASE_LOG_FOLDER: "/mnt/airflow/logs"
        expose:
          min_scale: 1
          max_scale: 1
          api_port: 8974
          cpu_threshold: 90
          rewrite_target: true
          health_path: "/health"
        mount:
          storage_provider: minio
          path: airflow