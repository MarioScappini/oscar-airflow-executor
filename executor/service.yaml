functions:
  oscar:
  - oscar-cluster:
      name: airflow-worker
      memory: 2Gi
      cpu: '1.0'
      image: apache/airflow:3.1.3
      script: script.sh

      synchronous:
        min_scale: 0
        max_scale: 10

      environment:
        Variables:
          AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
          AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-webserver-svc/system/services/airflow-webserver/exposed/execution/"
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@airflow-postgres66-db:5432/airflow"
          AIRFLOW__CORE__FERNET_KEY: "oJ7Fz4Yk5pH3Yb6nP2Y9vKXQm3R8tU5wZc1dEfGhIjk="
          AIRFLOW__API_AUTH__JWT_SECRET: "your-long-random-string-here2"
          AIRFLOW__API__SECRET_KEY: "your-long-random-string-here2"
          AIRFLOW__CORE__DAGS_FOLDER: "/tmp/dags/"
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          MINIO_ENDPOINT: "http://minio.minio.svc.cluster.local:9000"
          MINIO_ACCESS_KEY: "minio"
          MINIO_SECRET_KEY: "ZjQxMTQy"
          MINIO_BUCKET: "airflow"
          MINIO_DAGS_PREFIX: "dags/"